{% extends "base.html" %}

{% block title %}Register - My Yojana{% endblock %}

{% block content %}
<header>
    <h1>Join My Yojana</h1>
    <p>Create your account to find government schemes you're eligible for</p>
</header>

<section class="form-section">
    <h2>Create Your Account</h2>
    <form method="POST" class="auth-form">
        <div class="form-group">
            <input type="email" id="email" name="email" placeholder="Email Address" required 
                   value="{{ request.form.email if request.form else '' }}">
        </div>
        
        <div class="form-group">
            <input type="password" id="password" name="password" placeholder="Password (min 6 characters)" required>
        </div>
        
        <div class="form-group">
            <input type="password" id="confirm_password" name="confirm_password" placeholder="Confirm Password" required>
        </div>
        
        <button type="submit" class="btn btn-primary">Create Account</button>
    </form>
    
    <div class="auth-links">
        <p>Already have an account? <a href="{{ url_for('login') }}">Login here</a></p>
    </div>
</section>
{% endblock %}
