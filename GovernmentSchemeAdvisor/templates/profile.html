{% extends "base.html" %}

{% block title %}Profile - My Yojana{% endblock %}

{% block content %}
<header>
    <h1>Your Profile</h1>
    <p>Update your information to get accurate scheme recommendations</p>
</header>

<section class="form-section">
    <h2>Personal Information</h2>
    <form method="POST" class="profile-form">
        <div class="form-group">
            <input type="text" id="name" name="name" placeholder="Full Name" required 
                   value="{{ user.name if user.name else '' }}">
        </div>
        
        <div class="form-group">
            <input type="number" id="age" name="age" placeholder="Age" required min="0" max="120"
                   value="{{ user.age if user.age else '' }}">
        </div>
        
        <div class="form-group">
            <select id="gender" name="gender" required>
                <option value="">Select Gender</option>
                <option value="male" {% if user.gender == 'male' %}selected{% endif %}>Male</option>
                <option value="female" {% if user.gender == 'female' %}selected{% endif %}>Female</option>
                <option value="other" {% if user.gender == 'other' %}selected{% endif %}>Other</option>
            </select>
        </div>
        
        <div class="form-group">
            <input type="number" id="annual_income" name="annual_income" placeholder="Annual Income (in ₹)" required min="0"
                   value="{{ user.annual_income if user.annual_income is not none else '' }}">
        </div>
        
        <button type="submit" class="btn btn-primary">Save Profile</button>
    </form>
    
    <div class="profile-actions">
        <a href="{{ url_for('index') }}" class="btn btn-secondary">Back to Home</a>
    </div>
</section>
{% endblock %}
